services:
  web:
    image: ${ECR_IMAGE_URI}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env.prod
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    command: >
      sh -c "flask --app run.py db upgrade &&
      gunicorn -w ${GUNICORN_WORKERS:-2} -b 0.0.0.0:5000 run:app"

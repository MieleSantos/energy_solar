<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy | Solar Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <header class="glass-header">
            <div class="logo">
                <div class="sun-icon"></div>
                <h1>Energy <span class="badge">Solar Manager</span></h1>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-value" id="total-plants">0</span>
                    <span class="stat-label">Usinas Ativas</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="total-capacity">0 kW</span>
                    <span class="stat-label">Capacidade Total</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Form Section -->
            <section class="glass-panel form-panel">
                <h2>Adicionar Nova Usina</h2>
                <form id="plant-form">
                    <div class="form-group">
                        <label for="name">Nome da Usina</label>
                        <input type="text" id="name" placeholder="Ex: Usina Solar Alpha" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Localização (Cidade/Estado)</label>
                        <input type="text" id="location" placeholder="Ex: São Paulo, SP" required>
                    </div>
                    <div class="form-group">
                        <label for="capacity_kw">Capacidade (kW)</label>
                        <input type="number" id="capacity_kw" step="0.01" placeholder="Ex: 500" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Ativa">Ativa</option>
                            <option value="Em Construção">Em Construção</option>
                            <option value="Manutenção">Manutenção</option>
                            <option value="Inativa">Inativa</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Cadastrar Usina</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </form>
            </section>

            <!-- List Section -->
            <section class="glass-panel list-panel">
                <div class="panel-header">
                    <h2>Usinas Monitoradas</h2>
                    <button class="btn-icon" onclick="fetchPlants()" title="Atualizar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
                        </svg>
                    </button>
                </div>
                <div class="table-container">
                    <table class="glass-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Localização</th>
                                <th>Capacidade</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="plants-tbody">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
